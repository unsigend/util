# edge.ini - git-style INI edge cases

[space in value]
key = value with spaces inside
trimmed =   leading and trailing spaces

[ section ]
inside = section name has spaces in brackets

[section]
no_space = same section name without spaces in brackets

[empty]
empty_value =

[extra]
pair = key=value
with_hash = value#not_comment
semicolon = value;not_comment

[only_section]

[last_section_no_entry]

[blank_lines]

first = one

second = two


third = three

[comments]
# comment above
real = value
; semicolon comment
another = here

[tab_key]
	indented = tab before key

[subsection]
with_quotes = section "has" quotes

[spaces_after_value]
trailing = value        
many_trailing = x                    
mixed =   value   

[spaces_around_equals]
loose = val
wide  =  val
tab_after_val = v	

[leading_spaces_value]
normal = value
spaced =     value

[whitespace_only_value]
key =     
key2 =  	  
